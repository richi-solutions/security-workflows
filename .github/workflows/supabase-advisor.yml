# Reusable workflow: Supabase Security Advisor
# Called by project repos via security.yml
#
# Requires:
#   - Org secret: SUPABASE_ACCESS_TOKEN
#   - Repo variable: SUPABASE_PROJECT_REF

name: Supabase Security Advisor

on:
  workflow_call:
    inputs:
      project-ref:
        description: "Supabase project reference ID"
        required: true
        type: string

jobs:
  advisor:
    name: Supabase Audit
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Query Supabase Security Advisor
        id: advisor
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ inputs.project-ref }}
        run: |
          # Fetch lint results (no -f flag: always capture response for error handling)
          LINT=$(curl -s \
            -H "Authorization: Bearer ${SUPABASE_TOKEN}" \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/advisors/lint" \
            || echo '[]')

          echo "## Supabase Security Advisor Results" > /tmp/advisor-report.md
          echo "" >> /tmp/advisor-report.md
          echo "Project: \`${PROJECT_REF}\`" >> /tmp/advisor-report.md
          echo "" >> /tmp/advisor-report.md

          # Validate response is a JSON array (not an error object)
          if ! echo "$LINT" | jq -e 'type == "array"' > /dev/null 2>&1; then
            ERROR_MSG=$(echo "$LINT" | jq -r '.message // .error // "Unknown error"' 2>/dev/null || echo "Invalid API response")
            echo "### API Error" >> /tmp/advisor-report.md
            echo "" >> /tmp/advisor-report.md
            echo "Failed to fetch advisor results: $ERROR_MSG" >> /tmp/advisor-report.md
            echo "" >> /tmp/advisor-report.md
            echo "Possible causes:" >> /tmp/advisor-report.md
            echo "- Missing or invalid SUPABASE_ACCESS_TOKEN secret" >> /tmp/advisor-report.md
            echo "- Invalid project reference: ${PROJECT_REF}" >> /tmp/advisor-report.md
            echo "has_findings=error" >> "$GITHUB_OUTPUT"
            cat /tmp/advisor-report.md >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Check for critical security lints
          CRITICAL=$(echo "$LINT" | jq -r '[.[] | select(.level == "ERROR" or .level == "WARN")] | length')

          if [ "$CRITICAL" -gt 0 ]; then
            echo "### Findings ($CRITICAL issues)" >> /tmp/advisor-report.md
            echo "" >> /tmp/advisor-report.md
            echo "$LINT" | jq -r '.[] | select(.level == "ERROR" or .level == "WARN") | "- **[\(.level)]** \(.title): \(.description)"' >> /tmp/advisor-report.md
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "No security issues found." >> /tmp/advisor-report.md
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

          cat /tmp/advisor-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create Issue for Findings
        if: steps.advisor.outputs.has_findings == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/advisor-report.md', 'utf8');

            // Check if an open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,supabase-advisor',
              state: 'open'
            });

            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: report + '\n\n_Updated: ' + new Date().toISOString() + '_'
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Supabase Security Advisor: findings detected',
                body: report,
                labels: ['security', 'supabase-advisor']
              });
            }
