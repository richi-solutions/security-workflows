# Orchestrator: Triggers Claude security agent across all org repos
#
# This workflow discovers all repos in the richi-solutions org that have
# a .claude/agents/security-auditor.md file, then runs the Claude agent
# in each repo to scan and fix security issues.
#
# Requires org secrets:
#   - ANTHROPIC_API_KEY
#   - ORG_PAT (GitHub PAT with repo scope for creating PRs across repos)

name: Orchestrate Security Audit

on:
  workflow_dispatch:
  # Schedule disabled — run manually via workflow_dispatch to save ~50 EUR/month
  # Previously: cron: "0 3 * * 1" (Weekly Monday 03:00 UTC)

jobs:
  discover:
    name: Discover Repos
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}
    steps:
      - name: List org repos with security agent
        id: list
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          # Get all non-archived repos in the org
          REPOS=$(gh repo list richi-solutions \
            --no-archived \
            --json name,name \
            --limit 100 \
            -q '.[].name' \
            | grep -v '^orchestrator\.richi\.solutions$' \
            | grep -v '^\\.claude$')

          # Filter to repos that have the security agent
          VALID_REPOS="[]"
          for repo in $REPOS; do
            if gh api "repos/richi-solutions/$repo/contents/.claude/agents/security-auditor.md" --silent 2>/dev/null; then
              VALID_REPOS=$(echo "$VALID_REPOS" | jq --arg r "$repo" '. + [$r]')
            fi
          done

          echo "repos=$(echo $VALID_REPOS | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "Found repos: $VALID_REPOS"

  audit:
    name: Audit ${{ matrix.repo }}
    needs: discover
    if: needs.discover.outputs.repos != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.discover.outputs.repos) }}
      fail-fast: false
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: richi-solutions/${{ matrix.repo }}
          token: ${{ secrets.ORG_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tools
        run: |
          npm install -g @anthropic-ai/claude-code
          pip install semgrep
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.21.2_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks

      - name: Run Claude Security Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "You are the security-auditor agent. Read .claude/agents/security-auditor.md for your full instructions, then execute the security audit on this project. Fix all findings." \
            --allowedTools "Bash,Read,Edit,Grep,Glob" \
            --model claude-sonnet-4-6 \
            --max-turns 25 \
            --output-format json \
            > /tmp/audit-result.json 2>&1 || true

      - name: Create Fix PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="security-fix-$(date +%Y%m%d)"
            git config user.name "claude-security-bot"
            git config user.email "security@richi-solutions.com"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "$(cat <<'EOF'
          fix: automated security audit fixes

          Applied by Claude security-auditor agent.
          See PR body for detailed findings and fixes.

          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
          EOF
            )"
            git push origin "$BRANCH"

            # Extract summary from Claude output
            SUMMARY=$(cat /tmp/audit-result.json | jq -r '.result // "No summary available"' 2>/dev/null || echo "Audit completed, see diff for changes.")

            gh pr create \
              --repo "richi-solutions/${{ matrix.repo }}" \
              --title "fix: security audit auto-fix $(date +%Y-%m-%d)" \
              --body "$(cat <<EOF
          ## Security Audit — Automated Fix

          $SUMMARY

          ---
          _Generated by Claude security-auditor agent via [orchestrate-audit.yml](https://github.com/richi-solutions/orchestrator.richi.solutions)_
          EOF
            )" \
              --label "security,automated"
          else
            echo "No changes needed for ${{ matrix.repo }}"
          fi
